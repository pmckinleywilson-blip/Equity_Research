name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "sp500-events/**"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Render auto-deploys from GitHub — this job runs tests only
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r sp500-events/backend/requirements.txt
      - name: Basic import check
        working-directory: sp500-events/backend
        run: python -c "from main import app; print('Backend OK')"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: sp500-events/frontend
        run: npm ci
      - name: Build
        working-directory: sp500-events/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
